<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/indexStyle.css">
    <title>Claryum | Home</title>
</head>
<body>
    <div class="container">
        <h1 class="logo">Claryum</h1>
        <p class="slogan">Clareza para decisões que importam.</p>
        <p class="message">Estamos construindo um novo site para você. Em breve nos vemos por aqui.</p>

        <h3 class="form-title">Enquanto terminamos as coisas por aqui, que tal entrar em contato para mostrarmos nossos serviços?</h3>
        
        <form name="contact" method="POST" class="claryum-form" data-netlify="true">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="message">Como podemos te ajudar agora?</label>
                <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Enviar</button>
        </form>

        <footer>&copy; Since 2026</footer>
    </div>
</body>
</html>
